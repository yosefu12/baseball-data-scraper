name: Baseball Data Scraper

on:
  schedule:
    - cron: '23 20 * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4 lxml selenium webdriver-manager

      - name: Run Python Script
        env:
          FANGRAPHS_COOKIE: ${{ secrets.FANGRAPHS_COOKIE }}
        run: python baseball_project_data_fetcher.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global rebase.autoStash true 
          git add data/*.csv
          git commit -m "Automated data refresh" || echo "No changes to commit"
          git pull --rebase -X theirs
          git push
